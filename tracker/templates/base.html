<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <!-- Left: Brand -->
            <a class="navbar-brand" href="/">💰 Finance Tracker</a>
    
            <!-- Center: Navigation links -->
            <ul class="navbar-nav flex-row mx-auto">
                <li class="nav-item mx-3">
                    <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                </li>
                
                <li class="nav-item mx-3">
                    <a class="nav-link text-white" href="{% url 'about' %}">About Us</a>
                </li>

                <li class="nav-item mx-3">
                    <a class="nav-link text-white" href="{% url 'pricing' %}">Pricing</a>
                </li>
            </ul>
    
            <!-- Right: Auth buttons -->
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}" class="mb-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-outline-light btn-sm" href="{% url 'register' %}">Registration</a>
                {% endif %}
            </div>
        </div>
    </nav>
    

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
