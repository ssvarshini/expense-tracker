{% extends "sidenav.html" %}

{% block content %}
<h2>Edit Transaction</h2>

<form method="POST">
  {% csrf_token %}

  <input type="text" name="title" value="{{ transaction.title }}" required><br>

  <select name="type">
    <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
    <option value="food and drinks" {% if transaction.type == 'food and drinks' %}selected{% endif %}>Food and drinks</option>
    <option value="transport" {% if transaction.type == 'transport' %}selected{% endif %}>Transport</option>
    <option value="rent" {% if transaction.type == 'rent' %}selected{% endif %}>Rent</option>
    <option value="purchases" {% if transaction.type == 'purchases' %}selected{% endif %}>Purchases</option>
    <option value="life and entertainment" {% if transaction.type == 'life and entertainment' %}selected{% endif %}>Life and entertainment</option>
  </select><br>

  <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required><br>

  <button type="submit">Update</button>
</form>
{% endblock %}
