{% extends "base.html" %}

{% block content %}
  <h2>Register</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>
  <p>Have an Account Already? 
    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
  </p>
{% endblock %}
