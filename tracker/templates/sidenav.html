<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FinTrack{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 250px;
      background-color: #343a40;
    }
    .sidebar a {
      color: #fff;
      text-decoration: none;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-4">
    <h2 class="text-white mb-4">FinTrack</h2>
    <nav class="nav flex-column">
      <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
      <a class="nav-link" href="{% url 'transactions' %}">Transactions</a>
      <a class="nav-link" href="{% url 'budget' %}">Budget</a>
      <a class="nav-link" href="{% url 'categories' %}">Categories</a>
      <a class="nav-link" href="{% url 'goals' %}">Goals</a>
      <a class="nav-link" href="{% url 'profile' %}">Profile</a>
      <form method="post" action="{% url 'logout' %}" class="mb-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
    </nav>
  </div>

  <!-- Main content -->
  <div class="flex-grow-1 p-5 bg-light">
    {% block content %}
    <!-- Each page will inject content here -->
    {% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
